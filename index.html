<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>360° Slideshow Demo</title>

  <!-- Pannellum: 360°画像ビューア -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    }

    #viewerA, #viewerB {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      transition: opacity 1.2s linear;
    }

    #viewerA { opacity: 1; z-index: 1; }
    #viewerB { opacity: 0; z-index: 2; pointer-events: none; }

    .ui {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .badge, button {
      border: 0;
      border-radius: 999px;
      background: rgba(0,0,0,.52);
      color: #fff;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 13px;
      line-height: 1;
      padding: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.22);
    }

    button {
      pointer-events: auto;
      cursor: pointer;
    }

    #gyroButton {
      display: none;
    }

    .top {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .notice {
      max-width: min(92vw, 640px);
      color: #fff;
      background: rgba(0,0,0,.48);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .pnlm-load-box,
    .pnlm-panorama-info,
    .pnlm-controls-container {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="viewerA"></div>
  <div id="viewerB"></div>

  <div class="top">
    <div id="notice" class="notice"></div>
  </div>

  <div class="ui">
    <div id="counter" class="badge">1 / 12</div>
    <button id="gyroButton" type="button">ジャイロを有効にする</button>
  </div>

<script>
(() => {
  "use strict";

  /*
    ここに画像ファイル名を並べます。
    photosフォルダに 001.jpg 〜 012.jpg を入れてください。
  */
  const imageList = [
    "photos/001.jpg",
    "photos/002.jpg",
    "photos/003.jpg",
    "photos/004.jpg",
    "photos/005.jpg",
    "photos/006.jpg",
    "photos/007.jpg",
    "photos/008.jpg",
    "photos/009.jpg",
    "photos/010.jpg",
    "photos/011.jpg",
    "photos/012.jpg"
  ];

  const SLIDE_SECONDS = 20;
  const FADE_MILLISECONDS = 1200;

  const viewerAEl = document.getElementById("viewerA");
  const viewerBEl = document.getElementById("viewerB");
  const counterEl = document.getElementById("counter");
  const gyroButton = document.getElementById("gyroButton");
  const noticeEl = document.getElementById("notice");

  let currentIndex = 0;
  let front = "A";
  let viewerA = null;
  let viewerB = null;
  let timerId = null;
  let orientationEnabled = false;

  function showNotice(text, timeout = 3500) {
    noticeEl.textContent = text;
    noticeEl.style.display = "block";
    window.clearTimeout(showNotice._timer);
    showNotice._timer = window.setTimeout(() => {
      noticeEl.style.display = "none";
    }, timeout);
  }

  function viewerConfig(imagePath) {
    return {
      type: "equirectangular",
      panorama: imagePath,
      autoLoad: true,
      showControls: false,
      compass: false,
      keyboardZoom: false,
      mouseZoom: false,
      draggable: true,
      hfov: 100,
      yaw: 0,
      pitch: 0,
      friction: 0.18,
      orientationOnByDefault: orientationEnabled
    };
  }

  function destroyViewer(viewer) {
    if (viewer && typeof viewer.destroy === "function") {
      try { viewer.destroy(); } catch (e) {}
    }
  }

  function createViewer(targetId, imagePath) {
    return pannellum.viewer(targetId, viewerConfig(imagePath));
  }

  function activeViewer() {
    return front === "A" ? viewerA : viewerB;
  }

  function hiddenViewerName() {
    return front === "A" ? "B" : "A";
  }

  function updateCounter() {
    counterEl.textContent = `${currentIndex + 1} / ${imageList.length}`;
  }

  function applyCurrentView(toViewer) {
    const fromViewer = activeViewer();
    if (!fromViewer || !toViewer) return;

    try {
      toViewer.setYaw(fromViewer.getYaw(), false);
      toViewer.setPitch(fromViewer.getPitch(), false);
      toViewer.setHfov(fromViewer.getHfov(), false);
    } catch (e) {}
  }

  function switchToNext() {
    const nextIndex = (currentIndex + 1) % imageList.length;
    const targetName = hiddenViewerName();
    const targetId = targetName === "A" ? "viewerA" : "viewerB";

    if (targetName === "A") {
      destroyViewer(viewerA);
      viewerA = createViewer(targetId, imageList[nextIndex]);
      viewerA.on("load", () => applyCurrentView(viewerA));
    } else {
      destroyViewer(viewerB);
      viewerB = createViewer(targetId, imageList[nextIndex]);
      viewerB.on("load", () => applyCurrentView(viewerB));
    }

    window.setTimeout(() => {
      if (targetName === "A") {
        viewerAEl.style.opacity = "1";
        viewerAEl.style.pointerEvents = "auto";
        viewerBEl.style.opacity = "0";
        viewerBEl.style.pointerEvents = "none";
        front = "A";
      } else {
        viewerBEl.style.opacity = "1";
        viewerBEl.style.pointerEvents = "auto";
        viewerAEl.style.opacity = "0";
        viewerAEl.style.pointerEvents = "none";
        front = "B";
      }

      currentIndex = nextIndex;
      updateCounter();

      window.setTimeout(() => {
        if (front === "A") {
          destroyViewer(viewerB);
          viewerB = null;
          viewerBEl.innerHTML = "";
        } else {
          destroyViewer(viewerA);
          viewerA = null;
          viewerAEl.innerHTML = "";
        }
      }, FADE_MILLISECONDS + 200);
    }, 250);
  }

  function startTimer() {
    window.clearInterval(timerId);
    timerId = window.setInterval(switchToNext, SLIDE_SECONDS * 1000);
  }

  async function enableGyro() {
    try {
      if (
        typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function"
      ) {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== "granted") {
          showNotice("ジャイロの利用が許可されませんでした。指でドラッグして見渡せます。");
          return;
        }
      }

      orientationEnabled = true;
      const v = activeViewer();
      if (v && typeof v.startOrientation === "function") {
        v.startOrientation();
      }
      gyroButton.style.display = "none";
      showNotice("ジャイロを有効にしました。スマホを動かして見渡せます。");
    } catch (e) {
      showNotice("この端末ではジャイロを有効化できませんでした。指でドラッグして見渡せます。");
    }
  }

  function setupGyroButton() {
    const isMobileLike = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (!isMobileLike) return;

    gyroButton.style.display = "inline-block";
    gyroButton.addEventListener("click", enableGyro, { once: false });

    /*
      Androidの一部環境ではユーザー操作なしでもorientationが動く場合があります。
      iPhoneはボタン操作による許可が必要です。
    */
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission !== "function"
    ) {
      orientationEnabled = true;
      window.setTimeout(() => {
        const v = activeViewer();
        if (v && typeof v.startOrientation === "function") {
          try { v.startOrientation(); } catch (e) {}
        }
      }, 800);
    }
  }

  function init() {
    viewerA = createViewer("viewerA", imageList[currentIndex]);
    updateCounter();
    setupGyroButton();
    startTimer();

    viewerA.on("error", () => {
      showNotice("画像を読み込めませんでした。photosフォルダとファイル名を確認してください。", 6000);
    });
  }

  window.addEventListener("load", init);
})();
</script>
</body>
</html>
