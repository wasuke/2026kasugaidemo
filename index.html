<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>360° Slideshow Demo</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    }

    #viewerA, #viewerB {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      transition: opacity 1.2s linear;
    }

    #viewerA { opacity: 1; z-index: 1; }
    #viewerB { opacity: 0; z-index: 2; pointer-events: none; }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #fff;
      background:
        radial-gradient(circle at 50% 40%, rgba(60,80,120,.62), rgba(0,0,0,.96) 62%),
        #000;
      text-align: center;
    }

    #startPanel {
      width: min(92vw, 520px);
      padding: 26px 20px;
      border-radius: 24px;
      background: rgba(0,0,0,.38);
      box-shadow: 0 12px 40px rgba(0,0,0,.36);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #startPanel h1 {
      margin: 0 0 12px;
      font-size: clamp(22px, 5.8vw, 34px);
      line-height: 1.25;
      font-weight: 700;
    }

    #startPanel p {
      margin: 0 0 18px;
      color: rgba(255,255,255,.86);
      font-size: 15px;
      line-height: 1.7;
    }

    #startButton {
      border: 0;
      border-radius: 999px;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 700;
      line-height: 1;
      color: #111;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,0,0,.28);
    }

    #startButton:active {
      transform: translateY(1px);
    }

    .ui {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      opacity: 0;
      transition: opacity .4s ease;
    }

    .ui.show {
      opacity: 1;
    }

    .badge, .smallButton {
      border: 0;
      border-radius: 999px;
      background: rgba(0,0,0,.52);
      color: #fff;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 13px;
      line-height: 1;
      padding: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.22);
    }

    .smallButton {
      pointer-events: auto;
      cursor: pointer;
      display: none;
    }

    .top {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .notice {
      max-width: min(92vw, 640px);
      color: #fff;
      background: rgba(0,0,0,.52);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
      display: none;
      line-height: 1.5;
    }

    .pnlm-load-box,
    .pnlm-panorama-info,
    .pnlm-controls-container {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="viewerA"></div>
  <div id="viewerB"></div>

  <div id="startScreen">
    <div id="startPanel">
      <h1>360° Demo</h1>
      <p>
        「demoを開始する」を押すと、全画面表示に切り替えます。<br>
        iPhoneでは「ホームに追加」すると完全な全画面になります。<br>
        Androidではジャイロ開始を試みます。iPhoneでは同じ操作で許可画面が出ます。
      </p>
      <button id="startButton" type="button">demoを開始する</button>
    </div>
  </div>

  <div class="top">
    <div id="notice" class="notice"></div>
  </div>

  <div id="ui" class="ui">
    <div id="counter" class="badge">1 / 12</div>
    <button id="gyroButton" class="smallButton" type="button">ジャイロを有効にする</button>
  </div>

<script>
(() => {
  "use strict";

  /*
    photosフォルダに 001.jpg 〜 012.jpg を置いてください。
    20秒ごとに自動切替します。
  */
  const imageList = [
    "photos/001.jpg",
    "photos/002.jpg",
    "photos/003.jpg",
    "photos/004.jpg",
    "photos/005.jpg",
    "photos/006.jpg",
    "photos/007.jpg",
    "photos/008.jpg",
    "photos/009.jpg",
    "photos/010.jpg",
    "photos/011.jpg",
    "photos/012.jpg"
  ];

  const SLIDE_SECONDS = 20;
  const FADE_MILLISECONDS = 1200;

  const viewerAEl = document.getElementById("viewerA");
  const viewerBEl = document.getElementById("viewerB");
  const counterEl = document.getElementById("counter");
  const gyroButton = document.getElementById("gyroButton");
  const noticeEl = document.getElementById("notice");
  const startScreen = document.getElementById("startScreen");
  const startButton = document.getElementById("startButton");
  const ui = document.getElementById("ui");

  let currentIndex = 0;
  let front = "A";
  let viewerA = null;
  let viewerB = null;
  let timerId = null;
  let orientationEnabled = false;
  let started = false;

  const preloadState = {
    total: imageList.length,
    loaded: 0,
    failed: 0,
    done: false
  };

  function showNotice(text, timeout = 3500) {
    noticeEl.textContent = text;
    noticeEl.style.display = "block";
    window.clearTimeout(showNotice._timer);
    showNotice._timer = window.setTimeout(() => {
      noticeEl.style.display = "none";
    }, timeout);
  }

  function isMobileLike() {
    return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  }

  function isIOS() {
    return /iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  function viewerConfig(imagePath) {
    return {
      type: "equirectangular",
      panorama: imagePath,
      autoLoad: true,
      showControls: false,
      compass: false,
      keyboardZoom: false,
      mouseZoom: false,
      draggable: true,
      hfov: 100,
      yaw: 0,
      pitch: 0,
      friction: 0.18,
      orientationOnByDefault: orientationEnabled
    };
  }

  function preloadImages() {
    imageList.forEach((src) => {
      const img = new Image();
      img.decoding = "async";
      img.onload = () => {
        preloadState.loaded++;
        checkPreloadFinished();
      };
      img.onerror = () => {
        preloadState.failed++;
        checkPreloadFinished();
      };
      img.src = src;
    });
  }

  function checkPreloadFinished() {
    if (preloadState.loaded + preloadState.failed >= preloadState.total) {
      preloadState.done = true;
      if (started && preloadState.failed > 0) {
        showNotice(`${preloadState.failed}枚の画像を先読みできませんでした。ファイル名を確認してください。`, 6000);
      }
    }
  }

  function destroyViewer(viewer) {
    if (viewer && typeof viewer.destroy === "function") {
      try { viewer.destroy(); } catch (e) {}
    }
  }

  function createViewer(targetId, imagePath) {
    return pannellum.viewer(targetId, viewerConfig(imagePath));
  }

  function activeViewer() {
    return front === "A" ? viewerA : viewerB;
  }

  function hiddenViewerName() {
    return front === "A" ? "B" : "A";
  }

  function updateCounter() {
    counterEl.textContent = `${currentIndex + 1} / ${imageList.length}`;
  }

  function applyCurrentView(toViewer) {
    const fromViewer = activeViewer();
    if (!fromViewer || !toViewer) return;

    try {
      toViewer.setYaw(fromViewer.getYaw(), false);
      toViewer.setPitch(fromViewer.getPitch(), false);
      toViewer.setHfov(fromViewer.getHfov(), false);
    } catch (e) {}
  }

  function switchToNext() {
    if (!started) return;

    const nextIndex = (currentIndex + 1) % imageList.length;
    const targetName = hiddenViewerName();
    const targetId = targetName === "A" ? "viewerA" : "viewerB";

    if (targetName === "A") {
      destroyViewer(viewerA);
      viewerA = createViewer(targetId, imageList[nextIndex]);
      viewerA.on("load", () => applyCurrentView(viewerA));
      viewerA.on("error", () => showNotice("画像を読み込めませんでした。photosフォルダとファイル名を確認してください。", 6000));
    } else {
      destroyViewer(viewerB);
      viewerB = createViewer(targetId, imageList[nextIndex]);
      viewerB.on("load", () => applyCurrentView(viewerB));
      viewerB.on("error", () => showNotice("画像を読み込めませんでした。photosフォルダとファイル名を確認してください。", 6000));
    }

    window.setTimeout(() => {
      if (targetName === "A") {
        viewerAEl.style.opacity = "1";
        viewerAEl.style.pointerEvents = "auto";
        viewerBEl.style.opacity = "0";
        viewerBEl.style.pointerEvents = "none";
        front = "A";
      } else {
        viewerBEl.style.opacity = "1";
        viewerBEl.style.pointerEvents = "auto";
        viewerAEl.style.opacity = "0";
        viewerAEl.style.pointerEvents = "none";
        front = "B";
      }

      currentIndex = nextIndex;
      updateCounter();

      window.setTimeout(() => {
        if (front === "A") {
          destroyViewer(viewerB);
          viewerB = null;
          viewerBEl.innerHTML = "";
        } else {
          destroyViewer(viewerA);
          viewerA = null;
          viewerAEl.innerHTML = "";
        }
      }, FADE_MILLISECONDS + 200);
    }, 250);
  }

  function startTimer() {
    window.clearInterval(timerId);
    timerId = window.setInterval(switchToNext, SLIDE_SECONDS * 1000);
  }

  async function requestFullscreen() {
    const el = document.documentElement;

    try {
      if (el.requestFullscreen) {
        await el.requestFullscreen();
      } else if (el.webkitRequestFullscreen) {
        await el.webkitRequestFullscreen();
      }
    } catch (e) {
      showNotice("全画面表示に切り替えられませんでした。ブラウザの制限です。", 4500);
    }
  }

  async function enableGyro() {
    try {
      if (
        typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function"
      ) {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== "granted") {
          gyroButton.style.display = "inline-block";
          showNotice("ジャイロの利用が許可されませんでした。指でドラッグして見渡せます。", 5000);
          return false;
        }
      }

      orientationEnabled = true;

      const v = activeViewer();
      if (v && typeof v.startOrientation === "function") {
        v.startOrientation();
      }

      gyroButton.style.display = "none";
      showNotice("ジャイロを有効にしました。スマホを動かして見渡せます。", 3000);
      return true;
    } catch (e) {
      gyroButton.style.display = "inline-block";
      showNotice("この端末ではジャイロを有効化できませんでした。指でドラッグして見渡せます。", 5000);
      return false;
    }
  }

  function createInitialViewer() {
    destroyViewer(viewerA);
    viewerA = createViewer("viewerA", imageList[currentIndex]);
    viewerA.on("error", () => {
      showNotice("画像を読み込めませんでした。photosフォルダとファイル名を確認してください。", 6000);
    });
  }

  async function startDemo() {
    if (started) return;
    started = true;

    await requestFullscreen();

    startScreen.style.display = "none";
    ui.classList.add("show");

    /*
      最初のタップ操作内でジャイロ許可を試す。
      iPhoneではここで許可ダイアログが出る。
      Androidでは可能な範囲で自動開始する。
    */
    if (isMobileLike()) {
      await enableGyro();

      if (!orientationEnabled && isIOS()) {
        gyroButton.style.display = "inline-block";
      }
    }

    startTimer();

    if (!preloadState.done) {
      showNotice("画像を先読み中です。表示はこのまま開始します。", 3000);
    } else if (preloadState.failed > 0) {
      showNotice(`${preloadState.failed}枚の画像を先読みできませんでした。ファイル名を確認してください。`, 6000);
    }
  }

  function init() {
    preloadImages();
    createInitialViewer();
    updateCounter();

    startButton.addEventListener("click", startDemo);
    gyroButton.addEventListener("click", enableGyro);
  }

  window.addEventListener("load", init);
})();
</script>
</body>
</html>
